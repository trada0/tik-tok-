<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loading...</title>

<style>
html,body{
margin:0;
padding:0;
background:#000;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial, Helvetica, sans-serif;
}

/* container */
.guide{
display:flex;
align-items:center;
justify-content:center;
gap:14px;
padding:12px;
width:100%;
max-width:900px;
}

/* image box */
.step{
position:relative;
flex:1;
max-width:420px;
}

.step img{
width:100%;
height:auto;
border-radius:12px;
display:block;
}

/* label */
.label{
position:absolute;
top:6px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.75);
color:#fff;
padding:5px 12px;
border-radius:999px;
font-weight:bold;
font-size:13px;
}

/* arrow */
.arrow{
color:#fff;
font-size:28px;
font-weight:bold;
flex-shrink:0;
}

/* mobile fix */
@media(max-width:600px){

body{
align-items:flex-start;
padding-top:20px;
}

.guide{
flex-direction:column;
gap:10px;
}

.arrow{
transform:rotate(90deg);
font-size:24px;
}

.step{
width:100%;
max-width:100%;
}

.label{
font-size:12px;
padding:4px 10px;
}

}
</style>
</head>
<body>

<div id="content"></div>

<script>
var ua = navigator.userAgent || navigator.vendor || window.opera;

var isTikTok =
ua.includes("TikTok") ||
ua.includes("TTWebView") ||
ua.includes("Bytedance");

if(isTikTok){

document.getElementById("content").innerHTML = `
<div class="guide">

<div class="step">
<div class="label">Bước 1</div>
<img src="https://d2eioyamun8mp1.cloudfront.net/images/1775795921147_Jgz42MehCC.jpg">
</div>

<div class="arrow">➜</div>

<div class="step">
<div class="label">Bước 2</div>
<img src="https://d2eioyamun8mp1.cloudfront.net/images/1775796014226_VtpoB8dKgY.jpg">
</div>

</div>
`;

}else{
window.location.replace("https://s.shopee.vn/6L00saZVfm");
}
</script>

</body>
</html>
