<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>
html,body{
margin:0;
padding:0;
background:#000;
height:100%;
display:flex;
align-items:center;
justify-content:center;
}

img{
width:100%;
max-width:420px;
border-radius:12px;
}
</style>
</head>
<body>

<div id="content"></div>

<script>
var ua = navigator.userAgent;

// detect trình duyệt thật
var isRealBrowser =
ua.includes("Chrome") ||
ua.includes("Safari") ||
ua.includes("Firefox") ||
ua.includes("Edg");

// nếu là trình duyệt thật -> chuyển link
if(isRealBrowser){
window.location.replace("https://s.shopee.vn/6L00saZVfm");
}else{

// còn lại (TikTok, FB, IG...) -> hiện ảnh
document.getElementById("content").innerHTML =
'<img src="https://d2eioyamun8mp1.cloudfront.net/images/1775798547145_DvwavnLPQ2.png">';

}
</script>

</body>
</html>
