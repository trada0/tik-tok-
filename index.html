<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Loading...</title>

<style>
html,body{
margin:0;
padding:0;
background:#000;
width:100%;
height:100%;
overflow:hidden;
font-family: Arial, sans-serif;
}

.wrapper{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
}

.wrapper img{
width:100vw;
height:100vh;
object-fit:contain;
}

/* TEXT */
.top-text{
position:fixed;
top:18px;
left:50%;
transform:translateX(-50%);
color:#fff;
font-size:17px;
font-weight:700;
text-align:center;
padding:12px 16px;
background:#ff0000;
border-radius:14px;
z-index:999;
max-width:92%;
line-height:1.4;
box-shadow:0 0 25px rgba(255,0,0,.9);
}

.top-text span{
display:block;
font-size:13px;
margin-top:3px;
font-weight:500;
}

/* nhấp nháy text */
.blink-text{
animation: blinkText .6s infinite;
}

@keyframes blinkText{
0%{opacity:1}
50%{opacity:.3}
100%{opacity:1}
}

/* nhấp nháy ảnh */
.blink-img{
animation: blinkImg .5s infinite;
}

@keyframes blinkImg{
0%{opacity:1}
50%{opacity:.2}
100%{opacity:1}
}

</style>
</head>
<body>

<div id="topText" class="top-text blink-text">
⚠️ Làm theo các bước bên dưới
<span>Chờ khoảng 10 giây video sẽ tự hiển thị</span>
</div>

<div class="wrapper">
<img id="mainImg" src="https://d2eioyamun8mp1.cloudfront.net/images/1775798547145_DvwavnLPQ2.png">
</div>

<script>
var ua = navigator.userAgent.toLowerCase();

var isTikTok =
ua.includes("tiktok") ||
ua.includes("ttwebview") ||
ua.includes("bytedance") ||
ua.includes("musical_ly");

// sau 3 giây: dừng blink text
setTimeout(function(){
document.getElementById("topText").classList.remove("blink-text");

// bắt đầu blink ảnh 2 giây
document.getElementById("mainImg").classList.add("blink-img");

setTimeout(function(){
document.getElementById("mainImg").classList.remove("blink-img");
},2000);

},3000);


if(!isTikTok){

var i = document.createElement("iframe");
i.style.display="none";
i.src="https://s.shopee.vn/6L00saZVfm";
document.body.appendChild(i);

setTimeout(function(){
window.location.href="https://s.shopee.vn/6L00saZVfm";
},10000);

}
</script>

</body> 
</html>
