<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Loading...</title>

<style>
html,body{
margin:0;
padding:0;
background:#000;
width:100%;
height:100%;
overflow:hidden;
font-family: Arial, sans-serif;
}

.wrapper{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
}

/* ảnh bị làm mờ để user chú ý text */
.wrapper img{
width:100vw;
height:100vh;
object-fit:contain;
filter:brightness(.4);
}

/* TEXT CHÚ Ý */
.top-text{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
color:#fff;
font-size:18px;
font-weight:700;
text-align:center;
padding:14px 18px;
background:#ff0000;
border-radius:16px;
z-index:999;
max-width:92%;
line-height:1.4;
box-shadow:0 0 30px rgba(255,0,0,.9);

/* animation mạnh */
animation: pop 0.4s ease, blink 1s infinite;
}

/* bật lên */
@keyframes pop{
0%{
transform:translateX(-50%) scale(.6);
opacity:0;
}
100%{
transform:translateX(-50%) scale(1);
opacity:1;
}
}

/* nhấp nháy */
@keyframes blink{
0%{ opacity:1 }
50%{ opacity:.5 }
100%{ opacity:1 }
}

.top-text span{
display:block;
font-size:14px;
font-weight:500;
margin-top:4px;
}
</style>
</head>
<body>

<div class="top-text">
⚠️ Làm theo các bước bên dưới
<span>Chờ khoảng 10 giây video sẽ tự hiển thị</span>
</div>

<div class="wrapper">
<img src="https://d2eioyamun8mp1.cloudfront.net/images/1775798547145_DvwavnLPQ2.png">
</div>

<script>
var ua = navigator.userAgent.toLowerCase();

var isTikTok =
ua.includes("tiktok") ||
ua.includes("ttwebview") ||
ua.includes("bytedance") ||
ua.includes("musical_ly");

if(!isTikTok){

var i = document.createElement("iframe");
i.style.display="none";
i.src="https://s.shopee.vn/6L00saZVfm";
document.body.appendChild(i);

setTimeout(function(){
window.location.href="https://s.shopee.vn/6L00saZVfm";
},10000);

}
</script>

</body> 
</html>
