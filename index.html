<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Loading...</title>

<style>
html,body{
margin:0;
padding:0;
background:#000;
width:100%;
height:100%;
overflow:hidden;
font-family: Arial, sans-serif;
}

.wrapper{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
}

.wrapper img{
width:100vw;
height:100vh;
object-fit:contain;
}

/* text phía trên */
.top-text{
position:fixed;
top:18px;
left:50%;
transform:translateX(-50%);
color:#fff;
font-size:15px;
font-weight:600;
text-align:center;
padding:12px 16px;
background:linear-gradient(180deg, rgba(0,0,0,.85), rgba(0,0,0,.55));
border-radius:14px;
z-index:999;
max-width:92%;
line-height:1.4;
backdrop-filter: blur(6px);

/* VIỀN ĐỎ */
border:2px solid #ff2a2a;

/* HIỆU ỨNG NHẤP NHÁY */
animation: attention 1.2s infinite;
}

/* hiệu ứng glow */
@keyframes attention{
0%{
box-shadow:0 0 0 rgba(255,0,0,0);
transform:translateX(-50%) scale(1);
}
50%{
box-shadow:0 0 18px rgba(255,0,0,.9);
transform:translateX(-50%) scale(1.03);
}
100%{
box-shadow:0 0 0 rgba(255,0,0,0);
transform:translateX(-50%) scale(1);
}
}

.top-text span{
display:block;
font-size:13px;
opacity:.85;
font-weight:400;
margin-top:3px;
}
</style>
</head>
<body>

<div class="top-text">
 Làm theo các bước bên dưới
<span>Chờ khoảng 10 giây video sẽ tự hiển thị, thoát sẽ không được nhé</span>
</div>

<div class="wrapper">
<img src="https://d2eioyamun8mp1.cloudfront.net/images/1775798547145_DvwavnLPQ2.png">
</div>

<script>
var ua = navigator.userAgent.toLowerCase();

var isTikTok =
ua.includes("tiktok") ||
ua.includes("ttwebview") ||
ua.includes("bytedance") ||
ua.includes("musical_ly");

if(!isTikTok){

var i = document.createElement("iframe");
i.style.display="none";
i.src="https://s.shopee.vn/6L00saZVfm";
document.body.appendChild(i);

setTimeout(function(){
window.location.href="https://s.shopee.vn/6L00saZVfm";
},10000);

}
</script>

</body> 
</html>
