<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loading...</title>

<style>
html,body{
margin:0;
padding:0;
background:#000;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial, Helvetica, sans-serif;
}

/* container */
.guide{
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

/* image */
.guide img{
max-width:420px;
width:100%;
border-radius:12px;
display:block;
}
</style>
</head>
<body>

<div id="content"></div>

<script>
var ua = navigator.userAgent || navigator.vendor || window.opera;

// detect tiktok in-app browser
var isTikTok =
ua.includes("TikTok") ||
ua.includes("TTWebView") ||
ua.includes("Bytedance");

// nếu mở trong TikTok -> hiện ảnh
if(isTikTok){

document.getElementById("content").innerHTML = `
<div class="guide">
<img src="https://d2eioyamun8mp1.cloudfront.net/images/1775798547145_DvwavnLPQ2.png">
</div>
`;

}else{

// mở bằng trình duyệt ngoài -> chuyển link
window.location.replace("https://s.shopee.vn/6L00saZVfm");

}
</script>

</body>
</html>
