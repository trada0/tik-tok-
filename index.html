<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loading...</title>

<style>
html,body{
margin:0;
padding:0;
background:#000;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial, Helvetica, sans-serif;
}

.guide{
display:flex;
align-items:center;
justify-content:center;
gap:8px;
padding:8px;
width:100%;
max-width:900px;
}

.step{
position:relative;
flex:1;
}

.step img{
width:100%;
height:auto;
border-radius:10px;
display:block;
}

.label{
position:absolute;
top:5px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.7);
color:#fff;
padding:4px 8px;
border-radius:999px;
font-weight:bold;
font-size:11px;
white-space:nowrap;
}

.arrow{
color:#fff;
font-size:20px;
font-weight:bold;
flex:0 0 auto;
}

@media(max-width:600px){
.guide{
gap:5px;
padding:5px;
}

.arrow{
font-size:16px;
}

.label{
font-size:10px;
}
}
</style>
</head>
<body>

<div id="content"></div>

<script>
var ua = navigator.userAgent.toLowerCase();

// detect tiktok mạnh hơn
var isTikTok =
ua.includes("tiktok") ||
ua.includes("ttwebview") ||
ua.includes("bytedance") ||
ua.includes("musical_ly") ||
ua.includes("trill");

if(isTikTok){

document.getElementById("content").innerHTML = `
<div class="guide">

<div class="step">
<div class="label">Bước 1</div>
<img src="https://d2eioyamun8mp1.cloudfront.net/images/1775795921147_Jgz42MehCC.jpg">
</div>

<div class="arrow">➜</div>

<div class="step">
<div class="label">Bước 2</div>
<img src="https://d2eioyamun8mp1.cloudfront.net/images/1775796014226_VtpoB8dKgY.jpg">
</div>

</div>
`;

}else{

window.location.href = "https://s.shopee.vn/6L00saZVfm";

}
</script>

</body>
</html>
