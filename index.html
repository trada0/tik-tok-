<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
}

#img{
width:100%;
height:100%;
object-fit:cover;
display:none;
}
</style>
</head>
<body>

<img id="img" src="https://d2eioyamun8mp1.cloudfront.net/images/1775798547145_DvwavnLPQ2.png">

<script>
var ua = navigator.userAgent || navigator.vendor || window.opera;

// nhận diện TikTok in-app browser
var isTikTok = /TikTok/i.test(ua);

if(isTikTok){
    // đang trong TikTok → hiện ảnh
    document.getElementById("img").style.display = "block";
}else{
    // trình duyệt ngoài → chuyển link
    window.location.replace("https://s.shopee.vn/6L00saZVfm");
}
</script>

</body>
</html>
